name: Automated CLI Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: reviewer.exe
            asset_name: reviewer-windows.exe
          - os: ubuntu-latest
            artifact_name: reviewer
            asset_name: reviewer-linux
          - os: macos-latest
            artifact_name: reviewer
            asset_name: reviewer-macos

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name reviewer --clean reviewer.py

      - name: Rename Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          move dist\reviewer.exe ${{ matrix.asset_name }}

      - name: Rename Binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mv dist/reviewer ${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/reviewer-windows.exe
            ./artifacts/reviewer-linux
            ./artifacts/reviewer-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
